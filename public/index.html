<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Tracker</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Job Tracker</h1>
    <div id="summary" class="summary"></div>
  </header>

  <div class="controls">
    <input id="search" type="search" placeholder="Search company or role..." />
    <select id="statusFilter"><option value="">All statuses</option></select>
    <select id="categoryFilter"><option value="">All categories</option></select>
    <select id="platformFilter"><option value="">All platforms</option></select>
    <button id="refresh">Refresh</button>
  </div>

  <div class="table-wrap">
    <table id="table">
      <thead>
        <tr>
          <th data-key="id">ID</th>
          <th data-key="company">Company</th>
          <th data-key="role">Role</th>
          <th data-key="category">Category</th>
          <th data-key="platform">Platform</th>
          <th data-key="location">Location</th>
          <th data-key="salary">Salary</th>
          <th data-key="status">Status</th>
          <th data-key="date_applied">Date Applied</th>
          <th data-key="url">Link</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="10">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
