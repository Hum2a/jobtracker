name = "jobtracker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "jobtracker.humza-butt.space", custom_domain = true }
]

# Built React SPA (npm run build:web → dist/)
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[r2_buckets]]
binding = "DOCS"
bucket_name = "docket-docs"
preview_bucket_name = "docket-docs-preview"

[triggers]
crons = ["0 8 * * *"]

# Secrets (set via wrangler secret put, not committed):
#   DATABASE_URL
#   API_KEY
#   RESEND_API_KEY (optional)
#   DIGEST_TO (optional)
#   DIGEST_FROM (optional)
