name = "jobtracker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain (requires humza-butt.space to already be on Cloudflare, DNS proxied).
# Comment this out for the first deploy if the domain isn't wired up yet;
# Wrangler will otherwise fail trying to attach a route that doesn't exist.
routes = [
  { pattern = "jobtracker.humza-butt.space", custom_domain = true }
]

# Serves everything in public/ as static assets. Any request that doesn't
# match a file falls through to the Worker (src/index.ts), which handles /api/*.
[assets]
directory = "./public"
binding = "ASSETS"

# Secrets (set via `npm run secrets:db` / `npm run secrets:key`, not committed):
#   DATABASE_URL  - Neon pooled connection string
#   API_KEY       - static key required on write endpoints
